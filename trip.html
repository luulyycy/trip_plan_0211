<!DOCTYPE html>
<html lang="zh">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>怎麼辦！我的行李 · 智能天氣回溯</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
        }

        body {
            background: linear-gradient(145deg, #eef4fc 0%, #dde9fa 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }

        .glass-card {
            max-width: 1200px;
            width: 100%;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-radius: 56px;
            box-shadow: 0 30px 55px -20px #1c3f60, 0 0 0 1px rgba(255,255,255,0.7) inset;
            padding: 32px 36px;
            border: 1px solid rgba(255,255,255,0.9);
        }

        h1 {
            display: flex;
            align-items: center;
            gap: 16px;
            font-weight: 700;
            font-size: 2.4rem;
            color: #163c5a;
            margin-bottom: 4px;
            letter-spacing: -0.5px;
        }
        .badge-free {
            background: #b4d0f0;
            color: #123454;
            font-size: 1rem;
            padding: 6px 26px;
            border-radius: 60px;
            font-weight: 500;
            white-space: nowrap;
        }

        .sub-headline {
            margin-left: 74px;
            color: #2a5e86;
            border-left: 4px solid #b5cfef;
            padding-left: 22px;
            margin-bottom: 30px;
            font-weight: 400;
            font-size: 1.15rem;
            font-style: italic;
        }

        .input-panel {
            background: white;
            border-radius: 48px;
            padding: 28px 32px;
            box-shadow: 0 10px 22px -10px #1f3f60;
            margin-bottom: 32px;
            border: 1px solid #ffffff;
        }

        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            margin-bottom: 26px;
            align-items: flex-end;
        }

        .field {
            flex: 1 1 200px;
        }
        .field label {
            display: block;
            font-weight: 600;
            color: #1e4468;
            margin-bottom: 8px;
            font-size: 1rem;
            letter-spacing: 0.3px;
        }
        .field input, .field select {
            width: 100%;
            padding: 15px 22px;
            background: #f2f9ff;
            border: none;
            border-radius: 40px;
            font-size: 1.05rem;
            color: #002b4a;
            border: 2px solid transparent;
            transition: 0.2s;
        }
        .field select {
            appearance: none;
            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="%23365e7e" stroke-width="2"><polyline points="6 9 12 15 18 9"/></svg>');
            background-repeat: no-repeat;
            background-position: right 20px center;
            background-size: 18px;
        }
        .field input:focus, .field select:focus {
            outline: none;
            border-color: #86acd7;
            background: white;
        }
        .field input[type="date"] {
            color-scheme: light;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            gap: 18px;
            align-items: center;
            justify-content: space-between;
        }
        .btn-analyze {
            background: #1c4d78;
            border: none;
            padding: 16px 40px;
            border-radius: 60px;
            color: white;
            font-weight: 600;
            font-size: 1.2rem;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            box-shadow: 0 15px 28px -12px #133f60;
            transition: 0.15s;
            border: 1px solid #729bcb;
        }
        .btn-analyze:hover {
            background: #0f3a5a;
            transform: scale(1.01);
        }
        .btn-clear {
            background: transparent;
            border: 2px solid #bbd3f0;
            padding: 14px 34px;
            border-radius: 60px;
            font-weight: 600;
            color: #1d4c77;
            cursor: pointer;
            font-size: 1.05rem;
            transition: 0.15s;
        }
        .btn-clear:hover {
            background: #e3efff;
            border-color: #7ea2cb;
        }

        .weather-summary {
            background: #e1efff;
            border-radius: 40px;
            padding: 16px 24px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            font-size: 1.1rem;
            color: #12406b;
            border: 1px solid #c3dbfa;
        }
        .weather-icon {
            font-size: 2.2rem;
            background: white;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 5px 12px #aec9ed;
        }
        .weather-temp {
            font-weight: 700;
            font-size: 1.6rem;
            margin-right: 10px;
        }
        .weather-desc {
            font-weight: 500;
        }
        .weather-clothing {
            background: #b9d5fc;
            padding: 8px 22px;
            border-radius: 60px;
            font-weight: 600;
            margin-left: auto;
        }
        .weather-note {
            font-size: 0.9rem;
            background: #fef7e0;
            padding: 4px 16px;
            border-radius: 40px;
            color: #8a6e2c;
            margin-left: 10px;
        }

        .result-area {
            background: rgba(255,255,255,0.5);
            backdrop-filter: blur(4px);
            border-radius: 44px;
            padding: 24px 26px 30px;
            border: 1px solid rgba(255,255,255,0.8);
            min-height: 380px;
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 50px 20px;
            color: #557da5;
        }
        .empty-state .big-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            opacity: 0.6;
        }
        .empty-state p {
            background: #e9f2ff;
            padding: 16px 40px;
            border-radius: 60px;
            font-size: 1.2rem;
            font-weight: 450;
        }

        .result-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            flex-wrap: wrap;
            border-bottom: 2px dashed #b9d2f2;
            padding-bottom: 16px;
            margin-bottom: 22px;
        }
        .result-header h2 {
            font-size: 2rem;
            font-weight: 500;
            color: #133f63;
        }
        .dest-gender-badge {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .badge-dest {
            background: #c3d9f7;
            padding: 6px 26px;
            border-radius: 60px;
            font-weight: 600;
            color: #103658;
        }
        .badge-gender {
            background: #d9e1f0;
            padding: 6px 26px;
            border-radius: 60px;
            font-weight: 600;
            color: #1b3d5e;
        }

        .summary-block {
            background: #e4f0fd;
            border-radius: 60px;
            padding: 16px 28px;
            margin-bottom: 28px;
            display: flex;
            align-items: center;
            gap: 22px;
            flex-wrap: wrap;
            font-size: 1.2rem;
            font-weight: 500;
            color: #19537c;
        }
        .nights-badge {
            background: #1f527c;
            color: white;
            padding: 8px 32px;
            border-radius: 60px;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .grid-cat {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
        }
        .cat-card {
            background: white;
            border-radius: 32px;
            padding: 18px 18px 16px;
            box-shadow: 0 8px 20px #d2e2f5;
        }
        .cat-title {
            font-weight: 700;
            font-size: 1.3rem;
            border-bottom: 3px solid #deecfd;
            padding-bottom: 10px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #1e4e78;
        }
        .item-list {
            list-style: none;
        }
        .item-list li {
            display: flex;
            justify-content: space-between;
            padding: 8px 4px;
            border-bottom: 1px dashed #e0edfd;
            color: #1f4a6e;
        }
        .item-count {
            background: #deedff;
            padding: 4px 14px;
            border-radius: 40px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #123b5b;
        }
        .item-ml {
            font-size: 0.8rem;
            color: #5d7da3;
            margin-left: 6px;
            font-weight: 400;
        }
        .footnote {
            margin-top: 28px;
            background: #dfedfd;
            padding: 16px 30px;
            border-radius: 50px;
            color: #26537c;
            text-align: center;
        }
        .error-msg {
            background: #ffe7e3;
            color: #b14040;
            padding: 18px 30px;
            border-radius: 40px;
            border-left: 8px solid #c75c5c;
            font-weight: 500;
        }
    </style>
</head>
<body>
<div class="glass-card">
    <h1>
        😱 怎麼辦！我的行李
        <span class="badge-free">智能天氣回溯版</span>
    </h1>
    <div class="sub-headline">選擇日期自動查詢天氣，若無當年度數據則參考去年同月</div>

    <div class="input-panel">
        <div class="flex-row">
            <div class="field">
                <label>📍 目的地</label>
                <input type="text" id="destInput" placeholder="例：北京、北海道、曼谷..." value="">
            </div>
            <div class="field">
                <label>📅 出發日期</label>
                <input type="date" id="dateInput" value="">
            </div>
            <div class="field">
                <label>⚥ 你的性別</label>
                <select id="genderSelect">
                    <option value="male">男性</option>
                    <option value="female">女性</option>
                </select>
            </div>
        </div>
        <div class="btn-group">
            <button class="btn-analyze" id="analyzeBtn"><span>🌤️</span> 分析天氣與行李</button>
            <button class="btn-clear" id="clearBtn"><span>🧽</span> 清空所有</button>
        </div>
    </div>

    <div class="result-area" id="resultPanel">
        <div id="resultContent" class="empty-state">
            <div class="big-icon">🌍✈️</div>
            <p>選擇目的地、日期和性別，點擊「分析天氣與行李」</p>
        </div>
    </div>
</div>

<script>
    (function() {
        // ==================== 擴充天氣資料庫 ====================
        // 2026年天氣預報/實況 (當年度)
        const weather2026 = {
            '北京': {
                '3月': { 
                    tempRange: '4~11°C', 
                    condition: '多雲，偶有雨雪',
                    clothing: '厚外套、羽絨服、毛衣',
                    thick: true,
                    source: '中國天氣網 2026.3 '
                },
                '4月': { tempRange: '10~20°C', condition: '多雲轉晴', clothing: '薄外套、長袖、針織衫', thick: false, source: '中國天氣網 2026.4 ' }
            },
            '北海道': {
                '3月': { 
                    tempRange: '1~5°C', 
                    condition: '多雲時晴，偶有降雪',
                    clothing: '羽絨服、防水靴、圍巾',
                    thick: true,
                    source: 'Yahoo!天気 2026.3 '
                }
            },
            '曼谷': {
                '3月': { 
                    tempRange: '27~36°C', 
                    condition: '炎熱乾燥',
                    clothing: '短袖、短褲、防曬',
                    thick: false,
                    source: 'rp5.ru 2026.3 '
                }
            }
        };

        // 2025年歷史天氣 (去年同月)
        const weather2025 = {
            '北京': {
                '3月': { 
                    tempRange: '3~15°C', 
                    condition: '多雲轉小雨，早晚溫差大',
                    clothing: '薄外套、毛衣、長袖',
                    thick: false,
                    source: '歷史天氣 2025.3 '
                }
            },
            '北海道': {
                '3月': { 
                    tempRange: '-4~7°C', 
                    condition: '多雪，天氣寒冷',
                    clothing: '羽絨服、雪靴、厚手套',
                    thick: true,
                    source: 'Weather Spark 2025.3 '
                }
            },
            '曼谷': {
                '3月': { 
                    tempRange: '26~36°C', 
                    condition: '炎熱，偶有午後雷陣雨',
                    clothing: '短袖、短褲、雨傘、防曬',
                    thick: false,
                    source: 'Weather Spark 2025.3 '
                }
            }
        };

        // ==================== 天氣查找函數 (自動回溯) ====================
        function getMonthFromDate(dateStr) {
            if (!dateStr) return null;
            const date = new Date(dateStr);
            const month = date.getMonth() + 1; // 0-based
            const monthMap = {
                1: '1月', 2: '2月', 3: '3月', 4: '4月', 5: '5月', 6: '6月',
                7: '7月', 8: '8月', 9: '9月', 10: '10月', 11: '11月', 12: '12月'
            };
            return monthMap[month] || null;
        }

        // 模糊匹配目的地
        function matchDestination(input, db) {
            if (!input) return null;
            for (let key in db) {
                if (input.includes(key) || key.includes(input)) {
                    return key;
                }
            }
            return null;
        }

        // 主要天氣查找：先找2026，若無則找2025
        function findWeather(dest, monthStr) {
            if (!dest || !monthStr) return null;

            // 先標準化目的地
            const matchedDest2026 = matchDestination(dest, weather2026);
            const matchedDest2025 = matchDestination(dest, weather2025);
            
            let weather = null;
            let year = null;
            let actualDest = null;

            // 嘗試2026
            if (matchedDest2026 && weather2026[matchedDest2026][monthStr]) {
                weather = weather2026[matchedDest2026][monthStr];
                year = 2026;
                actualDest = matchedDest2026;
            } 
            // 若2026沒有，嘗試2025
            else if (matchedDest2025 && weather2025[matchedDest2025][monthStr]) {
                weather = weather2025[matchedDest2025][monthStr];
                year = 2025;
                actualDest = matchedDest2025;
            }

            if (weather) {
                return {
                    ...weather,
                    year: year,
                    note: year === 2025 ? '⚠️ 無當年度數據，採用去年同月歷史資料作為參考' : null
                };
            }
            return null;
        }

        // 根據天氣調整衣物
        function getClothingAdvice(weather, baseItems) {
            if (!weather) return baseItems;
            
            const newItems = JSON.parse(JSON.stringify(baseItems));
            
            if (newItems.clothing) {
                newItems.clothing = newItems.clothing.map(item => {
                    if (item.name.includes('薄外套')) {
                        if (weather.thick) {
                            item.name = '🧥 厚外套 (羽絨/保暖)';
                            item.baseCount = 1;
                        } else {
                            item.name = '🧥 薄外套 (防曬/防風)';
                            item.baseCount = 1;
                        }
                    }
                    if (item.name.includes('羽絨/厚外套')) {
                        item.baseCount = weather.thick ? 1 : 0;
                    }
                    return item;
                });
            }
            return newItems;
        }

        // 基底物品
        function getBaseItems(gender) {
            const isFemale = (gender === 'female');
            let clothing = [
                { name: '👕 短袖上衣', baseCount: 2 },
                { name: '👚 長袖上衣', baseCount: 1 },
                { name: '👖 長褲', baseCount: 2 },
                { name: '🩳 短褲', baseCount: 1 },
                { name: '🧥 薄外套', baseCount: 1 },
                { name: '🧣 羽絨/厚外套', baseCount: 0 }, 
                { name: '🩲 內衣褲', baseCount: 3 },
                { name: '🧦 襪子', baseCount: 3 },
                { name: '😴 睡衣', baseCount: 1 }
            ];

            if (isFemale) {
                clothing.push(
                    { name: '👙 胸罩', baseCount: 3 },
                    { name: '🩸 衛生棉/條', baseCount: 1, hideCount: true }
                );
            }

            return {
                clothing: clothing,
                footwear: [
                    { name: '👟 運動鞋/休閒鞋', baseCount: 1 },
                    { name: '🩴 拖鞋', baseCount: 1 }
                ],
                toiletries: [
                    { name: '🧴 洗髮精', baseCount: 1, ml: '50-80ml' },
                    { name: '🧴 護髮素', baseCount: 1, ml: '50ml' },
                    { name: '🧼 沐浴露', baseCount: 1, ml: '50-80ml' },
                    { name: '🧖 洗面乳', baseCount: 1, ml: '30-50ml' },
                    { name: '🪥 牙刷', baseCount: 1 },
                    { name: '🦷 牙膏 (旅行裝)', baseCount: 1 },
                    { name: '🧻 一次性毛巾/壓縮毛巾', baseCount: 2 },
                    { name: '💇 梳子', baseCount: 1 }
                ],
                bags_acc: [
                    { name: '🎒 隨身背包', baseCount: 1, max: 2 },
                    { name: '🧢 帽子', baseCount: 1, max: 3 },
                    { name: '💍 首飾/手錶', baseCount: 1, note: '依個人' }
                ],
                electronics: [
                    { name: '📱 手機+充電器', baseCount: 1 },
                    { name: '🔋 行動電源', baseCount: 1 },
                    { name: '🎧 耳機', baseCount: 1 },
                    { name: '📷 相機 (選配)', baseCount: 1, note: '選帶' }
                ],
                documents: [
                    { name: '🪪 證件(身份證/護照)', baseCount: 1, hideCount: true },
                    { name: '💳 信用卡/現金', baseCount: 1, hideCount: true }
                ]
            };
        }

        // 依天數調整 (固定2晚)
        function adjustByNights(baseItems, nightsNum) {
            const factor = Math.max(1, nightsNum / 2);
            const result = {};

            for (let category in baseItems) {
                result[category] = baseItems[category].map(item => {
                    let base = item.baseCount;
                    let count = Math.max(1, Math.ceil(base * factor));

                    if (item.name.includes('羽絨') || item.name.includes('厚外套')) {
                        count = (item.baseCount === 0) ? 0 : Math.max(1, Math.ceil(item.baseCount * factor));
                    }
                    if (item.name.includes('牙刷') && nightsNum >= 6) count = 2;
                    if (item.name.includes('牙膏') && nightsNum >= 6) count = 2;
                    if (item.name.includes('一次性毛巾') && nightsNum >= 4) count = 3;

                    if (category === 'footwear') {
                        if (item.name.includes('運動鞋')) count = 1;
                        if (item.name.includes('拖鞋')) count = 1;
                    }
                    if (item.max !== undefined) {
                        count = Math.min(item.max, count);
                    }
                    return { ...item, count };
                });
            }
            return result;
        }

        // 渲染
        function renderAnalysis(dest, dateStr, gender) {
            dest = dest.trim() || '未知地點';
            if (!dateStr) {
                document.getElementById('resultContent').innerHTML = `<div class="error-msg">❌ 請選擇出發日期</div>`;
                return;
            }

            const monthStr = getMonthFromDate(dateStr);
            const weather = findWeather(dest, monthStr);
            
            const nightsNum = 2; // 固定2晚

            const baseItems = getBaseItems(gender);
            const weatherAdjustedItems = getClothingAdvice(weather, baseItems);
            const finalItems = adjustByNights(weatherAdjustedItems, nightsNum);

            // 計算總件數
            let total = 0;
            for (let cat in finalItems) {
                if (Array.isArray(finalItems[cat])) {
                    finalItems[cat].forEach(i => {
                        if (!i.hideCount) total += (i.count || 0);
                    });
                }
            }

            const catTitle = {
                clothing: gender === 'male' ? '👔 衣物 (天氣優化)' : '👔 衣物 (含女性用品)',
                footwear: '👟 鞋類 (固定2雙)',
                toiletries: '🧴 洗沐用品',
                bags_acc: '🎒 包/帽/配飾',
                electronics: '📱 電子產品',
                documents: '📁 證件財務 (不計數量)'
            };

            // 天氣區塊
            let weatherHtml = '';
            if (weather) {
                const yearNote = weather.year === 2025 ? 
                    `<span class="weather-note">⚠️ 參考 ${weather.year}年同月歷史資料</span>` : 
                    `<span class="weather-note">📡 ${weather.year}年預報</span>`;
                
                weatherHtml = `
                    <div class="weather-summary">
                        <div class="weather-icon">${weather.thick ? '❄️' : '☀️'}</div>
                        <div>
                            <span class="weather-temp">${weather.tempRange}</span>
                            <span class="weather-desc">${weather.condition}</span>
                            <div style="font-size:0.9rem; color:#3d6a9c;">${weather.source || '氣象資料'} ${yearNote}</div>
                        </div>
                        <div class="weather-clothing">🧥 建議：${weather.clothing}</div>
                    </div>
                `;
            } else {
                weatherHtml = `
                    <div class="weather-summary" style="background:#fff0d0;">
                        <div class="weather-icon">🔍</div>
                        <div>無法取得「${dest}」${monthStr}的天氣資料（無當年度及去年數據），請參考一般建議</div>
                    </div>
                `;
            }

            let html = `
                <div class="result-header">
                    <h2>📋 個人化行李</h2>
                    <div class="dest-gender-badge">
                        <span class="badge-dest">${dest}</span>
                        <span class="badge-gender">${gender === 'male' ? '♂️ 男性' : '♀️ 女性'}</span>
                    </div>
                </div>
                ${weatherHtml}
                <div class="summary-block">
                    <span class="nights-badge">${dateStr} 出發</span>
                    <span>🧳 總共約 <strong style="font-size:1.6rem;">${total}</strong> 件物品 (不含證件)</span>
                </div>
                <div class="grid-cat">
            `;

            for (let cat in finalItems) {
                if (!finalItems[cat] || finalItems[cat].length === 0) continue;
                html += `<div class="cat-card"><div class="cat-title">${catTitle[cat] || cat}</div><ul class="item-list">`;
                finalItems[cat].forEach(item => {
                    let countDisplay = item.count !== undefined ? item.count : item.baseCount;
                    let mlText = item.ml ? ` <span class="item-ml">(${item.ml})</span>` : '';
                    
                    if (item.hideCount) {
                        html += `<li><span class="item-name">${item.name}${mlText}</span><span class="item-count">✓</span></li>`;
                    } else {
                        html += `<li><span class="item-name">${item.name}${mlText}</span><span class="item-count">${countDisplay}</span></li>`;
                    }
                });
                html += `</ul></div>`;
            }

            html += `</div>`;
            html += `<div class="footnote">🔹 衣物建議已根據${weather ? weather.year + '年' : ''}${monthStr}天氣調整。查無當年度數據時自動採用去年同月資料。證件與衛生棉僅標記✓。</div>`;

            document.getElementById('resultContent').innerHTML = html;
        }

        function clearAll() {
            document.getElementById('destInput').value = '';
            document.getElementById('dateInput').value = '';
            document.getElementById('genderSelect').value = 'male';
            document.getElementById('resultContent').innerHTML = `
                <div class="empty-state">
                    <div class="big-icon">🌍✈️</div>
                    <p>選擇目的地、日期和性別，點擊「分析天氣與行李」</p>
                </div>
            `;
        }

        // 綁定
        const destInput = document.getElementById('destInput');
        const dateInput = document.getElementById('dateInput');
        const genderSelect = document.getElementById('genderSelect');
        const analyzeBtn = document.getElementById('analyzeBtn');
        const clearBtn = document.getElementById('clearBtn');

        clearAll(); 

        analyzeBtn.addEventListener('click', () => {
            renderAnalysis(destInput.value, dateInput.value, genderSelect.value);
        });

        clearBtn.addEventListener('click', clearAll);

        destInput.addEventListener('keypress', (e) => e.key === 'Enter' && analyzeBtn.click());
    })();
</script>
</body>
</html>
